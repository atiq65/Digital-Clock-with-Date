<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time & Date</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-800 flex items-center justify-center h-screen">
    <div
      class="bg-gray-700 p-8 rounded-2xl shadow-xl text-center border-2 border-yellow-500"
    >
      <h1 class="text-yellow-500 text-xl font-bold mb-4">Bangladesh Time</h1>
      <div id="clock" class="text-5xl text-white font-mono font-bold mb-2">
        00:00:00
      </div>
      <div id="date" class="text-gray-400 text-lg">Today Date</div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
